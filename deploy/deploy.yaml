apiVersion: apps/v1
kind: Deployment
metadata:
  name: otlp-server
  labels:
    app: otlp-server
    component: http-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otlp-server
  template:
    metadata:
      labels:
        app: otlp-server
        component: http-receiver
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otlp-server-data
      containers:
      - name: otlp-server
        image: local/otlp-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: CARVE_CSV_DIR
          value: "/data"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true