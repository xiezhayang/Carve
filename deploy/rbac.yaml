# Carve 使用的 RBAC：在同一 namespace 内创建/删除训练 Job 与告警器 Deployment
# 部署前请将 namespace 改为 Carve 实际所在命名空间（与 CARVE_JOB_NAMESPACE 一致）
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: carve
  namespace: carve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carve-job-and-alerter
  namespace: carve
rules:
  # 训练 Pod：创建、删除、查看 Job
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  # 告警器 Pod：创建、删除、查看 Deployment
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carve-job-and-alerter
  namespace: carve
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: carve-job-and-alerter
subjects:
  - kind: ServiceAccount
    name: carve
    namespace: carve